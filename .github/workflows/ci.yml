name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  PY_COLORS: 1
  UV_VERSION: 0.9.17
  UV_LOCKED: 1
  UV_NO_SYNC: 1

jobs:
  ci:
    runs-on: "${{ matrix.platform }}-latest"
    strategy:
      fail-fast: false
      # https://blog.jaraco.com/efficient-use-of-ci-resources/
      matrix:
        python: ["3.10", "3.14"]
        platform: ["ubuntu", "macos", "windows"]
        include:
        - python: "3.11"
          platform: "ubuntu"
        - python: "3.12"
          platform: "ubuntu"
        - python: "3.13"
          platform: "ubuntu"
    env:
      UV_PYTHON: ${{ matrix.python }}
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
    - name: Setup uv
      uses: astral-sh/setup-uv@ed21f2f24f8dd64503750218de024bcf64c7250a  # v7.1.5
      with:
        version: ${{ env.UV_VERSION }}
    - name: Environment
      id: sync
      run: uv sync
    - name: taplo (TOML formatting)
      if: ${{ !cancelled() && steps.sync.conclusion == 'success' && matrix.platform == 'ubuntu' }}
      run: uv run taplo fmt --check --diff pyproject.toml
    - name: ruff format
      if: ${{ !cancelled() && steps.sync.conclusion == 'success' }}
      run: uv run ruff format --diff --preview
    - name: ruff lint
      if: ${{ !cancelled() && steps.sync.conclusion == 'success' }}
      run: uv run ruff check --output-format github
    - name: pytest
      if: ${{ !cancelled() && steps.sync.conclusion == 'success' }}
      run: uv run pytest -vv
    - name: pyright
      if: ${{ !cancelled() && steps.sync.conclusion == 'success' }}
      run: uv run pyright src tests scripts
